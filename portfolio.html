<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Curated flagship repositories across AI systems, learning paths, applied platforms, and agentic experiments.">
    <meta name="theme-color" content="#0f766e">
    <meta name="author" content="Learn By Doing with Steven">
    <title>Portfolio | Learn By Doing with Steven</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body data-page="portfolio">
    <div class="site-shell">
        <header class="site-header">
            <div class="container">
                <div class="header-bar">
                    <a class="brand" href="index.html">
                        <span class="brand-mark">
                            <img class="brand-avatar" src="images/creator_profile.jpeg" alt="Steven portrait">
                        </span>
                        <span class="brand-copy">
                            <span class="brand-name">Learn By Doing with Steven</span>
                            <span class="brand-tag" data-i18n="shared.brand.tag"></span>
                        </span>
                    </a>
                    <nav class="site-nav" aria-label="Primary">
                        <a class="nav-link" href="index.html" data-i18n="shared.nav.home"></a>
                        <a class="nav-link" href="advisory/index.html" data-i18n="shared.nav.advisory"></a>
                        <a class="nav-link is-current" href="portfolio.html" aria-current="page" data-i18n="shared.nav.portfolio"></a>
                        <a class="nav-link" href="podcasts.html" data-i18n="shared.nav.directory"></a>
                    </nav>
                    <div class="header-actions">
                        <div class="language-switch" aria-label="Language selector">
                            <button class="lang-btn" type="button" data-lang="zh" aria-pressed="false">中文</button>
                            <button class="lang-btn" type="button" data-lang="en" aria-pressed="false">EN</button>
                            <button class="lang-btn" type="button" data-lang="it" aria-pressed="false">IT</button>
                        </div>
                        <a class="button button-ghost" href="https://github.com/learnbydoingwithsteven" target="_blank" rel="noopener" data-i18n="shared.nav.github"></a>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <section class="hero">
                <div class="container hero-grid">
                    <div class="hero-copy reveal">
                        <p class="eyebrow" data-i18n="portfolio.hero.eyebrow"></p>
                        <h1 class="display-title">
                            <span data-i18n="portfolio.hero.titleLead"></span><br>
                            <span class="accent" data-i18n="portfolio.hero.titleAccent"></span>
                        </h1>
                        <p class="hero-lead" data-i18n="portfolio.hero.subtitle"></p>
                        <div class="button-row">
                            <a class="button button-primary" href="https://github.com/learnbydoingwithsteven" target="_blank" rel="noopener" data-i18n="portfolio.hero.primary"></a>
                            <a class="button button-secondary" href="mailto:wjbear2020@gmail.com" data-i18n="portfolio.hero.secondary"></a>
                        </div>
                        <div class="metric-strip" id="portfolio-stats"></div>
                    </div>

                    <aside class="profile-panel reveal">
                        <div class="profile-image-wrap">
                            <img class="profile-image" src="images/creator_profile.jpeg" alt="Steven portrait">
                        </div>
                        <div class="profile-copy-wrap">
                            <p class="profile-kicker" data-i18n="portfolio.projectsIntro.label"></p>
                            <h2 class="profile-title" data-i18n="portfolio.projectsIntro.title"></h2>
                            <p class="profile-copy" data-i18n="portfolio.projectsIntro.copy"></p>
                        </div>
                    </aside>
                </div>
            </section>

            <section class="section">
                <div class="container">
                    <div class="project-filter-bar reveal" id="project-filters"></div>
                    <div class="project-grid" id="project-grid"></div>
                </div>
            </section>

            <section class="section">
                <div class="container">
                    <div class="section-intro reveal">
                        <div>
                            <p class="section-label" data-i18n="portfolio.about.label"></p>
                            <h2 class="section-title" data-i18n="portfolio.about.title"></h2>
                        </div>
                        <p class="section-copy" data-i18n="portfolio.about.copy"></p>
                    </div>
                    <div class="guiding-grid">
                        <article class="principle-card reveal">
                            <h3 class="principle-title" data-i18n="portfolio.principles.0.title"></h3>
                            <p class="principle-copy" data-i18n="portfolio.principles.0.copy"></p>
                        </article>
                        <article class="principle-card reveal">
                            <h3 class="principle-title" data-i18n="portfolio.principles.1.title"></h3>
                            <p class="principle-copy" data-i18n="portfolio.principles.1.copy"></p>
                        </article>
                        <article class="principle-card reveal">
                            <h3 class="principle-title" data-i18n="portfolio.principles.2.title"></h3>
                            <p class="principle-copy" data-i18n="portfolio.principles.2.copy"></p>
                        </article>
                    </div>
                </div>
            </section>

            <section class="section">
                <div class="container">
                    <div class="cta-card reveal">
                        <div class="cta-content">
                            <h2 class="cta-title" data-i18n="portfolio.cta.title"></h2>
                            <p class="cta-copy" data-i18n="portfolio.cta.copy"></p>
                            <div class="button-row">
                                <a class="button button-secondary" href="podcasts.html" data-i18n="portfolio.cta.primary"></a>
                                <a class="button button-ghost" href="https://github.com/learnbydoingwithsteven" target="_blank" rel="noopener" data-i18n="portfolio.cta.secondary"></a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="container">
                <div class="footer-card reveal">
                    <div class="footer-copy">
                        <p>&copy; <span data-current-year></span> Learn By Doing with Steven</p>
                        <p data-i18n="shared.footer.lineOne"></p>
                        <p data-i18n="shared.footer.lineTwo"></p>
                    </div>
                    <div class="footer-links">
                        <a class="button button-ghost" href="index.html" data-i18n="shared.nav.home"></a>
                        <a class="button button-ghost" href="advisory/index.html" data-i18n="shared.nav.advisory"></a>
                        <a class="button button-ghost" href="podcasts.html" data-i18n="shared.nav.directory"></a>
                    </div>
                </div>
            </div>
        </footer>

        <button class="top-button" type="button" data-i18n-aria-label="shared.backToTop">↑</button>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
