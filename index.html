<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A multilingual hub for Steven's AI systems, portfolio work, podcast channels, and global communities.">
    <meta name="theme-color" content="#0f766e">
    <meta name="author" content="Learn By Doing with Steven">
    <title>Learn By Doing with Steven | Multilingual AI Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body data-page="home">
    <div class="site-shell">
        <header class="site-header">
            <div class="container">
                <div class="header-bar">
                    <a class="brand" href="index.html">
                        <span class="brand-mark">LB</span>
                        <span class="brand-copy">
                            <span class="brand-name">Learn By Doing</span>
                            <span class="brand-tag" data-i18n="shared.brand.tag"></span>
                        </span>
                    </a>
                    <nav class="site-nav" aria-label="Primary">
                        <a class="nav-link is-current" href="index.html" aria-current="page" data-i18n="shared.nav.home"></a>
                        <a class="nav-link" href="advisory/" data-i18n="shared.nav.advisory"></a>
                        <a class="nav-link" href="portfolio.html" data-i18n="shared.nav.portfolio"></a>
                        <a class="nav-link" href="podcasts.html" data-i18n="shared.nav.directory"></a>
                    </nav>
                    <div class="header-actions">
                        <div class="language-switch" aria-label="Language selector">
                            <button class="lang-btn" type="button" data-lang="zh" aria-pressed="false">中文</button>
                            <button class="lang-btn" type="button" data-lang="en" aria-pressed="false">EN</button>
                            <button class="lang-btn" type="button" data-lang="it" aria-pressed="false">IT</button>
                        </div>
                        <a class="button button-ghost" href="https://github.com/learnbydoingwithsteven" target="_blank" rel="noopener" data-i18n="shared.nav.github"></a>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <section class="hero">
                <div class="container hero-grid">
                    <div class="hero-copy reveal">
                        <p class="eyebrow" data-i18n="home.hero.eyebrow"></p>
                        <h1 class="display-title">
                            <span data-i18n="home.hero.titleLead"></span><br>
                            <span class="accent" data-i18n="home.hero.titleAccent"></span>
                        </h1>
                        <p class="hero-lead" data-i18n="home.hero.subtitle"></p>
                        <div class="button-row">
                            <a class="button button-primary" href="portfolio.html" data-i18n="home.hero.primary"></a>
                            <a class="button button-secondary button-advisory-highlight" href="advisory/" data-i18n="home.hero.advisory"></a>
                            <a class="button button-secondary" href="podcasts.html" data-i18n="home.hero.secondary"></a>
                            <a class="button button-ghost" href="mailto:wjbear2020@gmail.com" data-i18n="home.hero.tertiary"></a>
                        </div>
                        <div class="metric-strip" id="home-metrics"></div>
                    </div>

                    <aside class="profile-panel reveal">
                        <div class="profile-image-wrap">
                            <img class="profile-image" src="images/creator_profile.jpeg" alt="Steven portrait">
                        </div>
                        <div class="profile-copy-wrap">
                            <p class="profile-kicker" data-i18n="home.profile.kicker"></p>
                            <h2 class="profile-title" data-i18n="home.profile.title"></h2>
                            <p class="profile-copy" data-i18n="home.profile.body"></p>
                            <ul class="signal-list" id="home-signals"></ul>
                        </div>
                    </aside>
                </div>
            </section>

            <section class="section">
                <div class="container">
                    <div class="section-intro reveal">
                        <div>
                            <p class="section-label" data-i18n="home.intro.label"></p>
                            <h2 class="section-title" data-i18n="home.intro.title"></h2>
                        </div>
                        <p class="section-copy" data-i18n="home.intro.copy"></p>
                    </div>
                    <div class="bento-grid" id="home-insights"></div>
                </div>
            </section>

            <section class="section">
                <div class="container">
                    <div class="section-intro reveal">
                        <div>
                            <p class="section-label" data-i18n="home.linksIntro.label"></p>
                            <h2 class="section-title" data-i18n="home.linksIntro.title"></h2>
                        </div>
                        <p class="section-copy" data-i18n="home.linksIntro.copy"></p>
                    </div>
                    <div class="directory-grid" id="home-groups"></div>
                </div>
            </section>

            <section class="section">
                <div class="container">
                    <div class="cta-card reveal">
                        <div class="cta-content">
                            <h2 class="cta-title" data-i18n="home.cta.title"></h2>
                            <p class="cta-copy" data-i18n="home.cta.copy"></p>
                            <div class="button-row">
                                <a class="button button-secondary" href="podcasts.html" data-i18n="home.cta.primary"></a>
                                <a class="button button-ghost button-cta-highlight" href="portfolio.html" data-i18n="home.cta.secondary"></a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="container">
                <div class="footer-card reveal">
                    <div class="footer-copy">
                        <p>&copy; <span data-current-year></span> Learn By Doing with Steven</p>
                        <p data-i18n="shared.footer.lineOne"></p>
                        <p data-i18n="shared.footer.lineTwo"></p>
                    </div>
                    <div class="footer-links">
                        <a class="button button-ghost" href="portfolio.html" data-i18n="shared.nav.portfolio"></a>
                        <a class="button button-ghost" href="advisory/" data-i18n="shared.nav.advisory"></a>
                        <a class="button button-ghost" href="podcasts.html" data-i18n="shared.nav.directory"></a>
                    </div>
                </div>
            </div>
        </footer>

        <button class="top-button" type="button" data-i18n-aria-label="shared.backToTop">↑</button>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
